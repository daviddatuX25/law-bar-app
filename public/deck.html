<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retrieval Deck — Study Mode</title>
  <link rel="stylesheet" href="app.css">
  <style>
    .deck-control-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 30px;
      box-shadow: 0 4px 12px rgba(27, 33, 29, 0.05);
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .dropdown-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .deck-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-top: 10px;
      min-height: 380px;
    }

    /* Flip Card Animation Wrapper (optional, let's keep it simple and robust) */
    .study-card {
      background: var(--panel);
      border: 1px solid var(--rule);
      border-radius: 20px;
      min-height: 320px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      position: relative;
      box-shadow: var(--shadow);
      user-select: none;
    }
    
    .study-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 35px rgba(27, 33, 29, 0.18);
      border-color: var(--gold);
    }
    
    .study-card:active {
      transform: scale(0.99);
    }

    .card-front, .card-back {
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .card-front h3 {
      font-family: 'Fraunces', serif;
      font-size: 28px;
      color: var(--ink);
      margin: 0 0 20px 0;
      line-height: 1.3;
      max-width: 800px;
    }

    .card-triggers {
      font-family: 'IBM Plex Mono', monospace;
      color: var(--gold-deep);
      background: rgba(169, 117, 47, 0.08);
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 13px;
      border: 1px dashed rgba(169, 117, 47, 0.3);
      letter-spacing: 0.02em;
    }

    .card-back {
      display: none;
      text-align: left;
      align-items: flex-start;
    }

    .card-back h2 {
      font-family: 'Fraunces', serif;
      font-size: 26px;
      color: var(--green-deep);
      margin-top: 0;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 10px;
      width: 100%;
    }

    .card-back-elements-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--ink);
      opacity: 0.6;
      margin-bottom: 8px;
    }

    #card-back-elements {
      width: 100%;
      margin: 0 0 20px 0;
      padding-left: 15px;
      border-left: 2px solid var(--rule);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #card-back-elements div {
      font-size: 15px;
      line-height: 1.5;
      color: #3a3f38;
    }

    #card-back-elements div::before {
      content: "•";
      color: var(--green);
      margin-right: 8px;
      display: inline-block;
      width: 8px;
      font-weight: bold;
    }

    .card-back-confusion-box {
      background: rgba(161, 61, 43, 0.06);
      border: 1px solid rgba(161, 61, 43, 0.15);
      border-radius: 8px;
      padding: 12px 16px;
      width: 100%;
      margin-top: 10px;
    }

    #card-back-confusion {
      margin: 0;
      color: var(--red);
      font-size: 14px;
      line-height: 1.5;
      font-weight: 500;
    }

    /* Decoy Split Layout */
    .decoy-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      display: none;
      width: 100%;
    }

    .decoy-subcard {
      background: var(--panel);
      border: 1px dashed var(--rule);
      border-radius: 16px;
      padding: 30px;
      box-shadow: var(--shadow);
      transition: border-color 0.2s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 200px;
    }
    
    .decoy-subcard:hover {
      border-color: var(--gold);
    }

    .decoy-subcard h3 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold-deep);
      margin-top: 0;
      margin-bottom: 15px;
      opacity: 0.8;
    }

    .decoy-subcard p {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      line-height: 1.4;
      margin: 0 0 20px 0;
      color: var(--ink);
      flex-grow: 1;
    }

    .decoy-subcard strong {
      font-size: 13px;
      color: var(--green-deep);
      background: rgba(63, 93, 67, 0.08);
      padding: 4px 10px;
      border-radius: 4px;
      display: inline-block;
      font-weight: 600;
      border: 1px solid rgba(63, 93, 67, 0.15);
    }

    .highlight-diff {
      grid-column: span 2;
      background: linear-gradient(135deg, rgba(169, 117, 47, 0.05), rgba(169, 117, 47, 0.1));
      border: 1px solid rgba(169, 117, 47, 0.3);
      border-left: 5px solid var(--gold);
      border-radius: 12px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .highlight-diff h4 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold-deep);
      margin-top: 0;
      margin-bottom: 8px;
    }

    #decoy-diff-text {
      margin: 0;
      font-size: 15px;
      line-height: 1.6;
      font-style: italic;
      color: var(--ink);
    }

    /* Premium Buttons */
    .btn-premium {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      outline: none;
      user-select: none;
    }

    .btn-premium:hover:not(:disabled) {
      border-color: var(--gold);
      color: var(--gold-deep);
      box-shadow: 0 4px 10px rgba(169, 117, 47, 0.12);
      transform: translateY(-1px);
    }
    
    .btn-premium:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-premium:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--green);
      color: white;
      border-color: var(--green);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--green-deep);
      border-color: var(--green-deep);
      color: white;
      box-shadow: 0 4px 10px rgba(63, 93, 67, 0.2);
    }

    .btn-toggle-active {
      background: var(--gold-deep);
      color: white;
      border-color: var(--gold-deep);
    }
    .btn-toggle-active:hover {
      background: var(--gold);
      border-color: var(--gold);
      color: white;
    }

    .nav-buttons-container {
      margin-top: 30px;
      display: flex;
      gap: 15px;
      justify-content: center;
      align-items: center;
    }

    .progress-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: #7a7e74;
      min-width: 120px;
      text-align: center;
    }

    /* Flip hint at the bottom of standard card */
    .flip-hint {
      position: absolute;
      bottom: 15px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #8a8d80;
      letter-spacing: 0.05em;
    }

    .empty-deck-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 320px;
      text-align: center;
      color: #8a8d80;
      font-style: italic;
      background: rgba(0, 0, 0, 0.02);
      border: 1px dashed var(--rule);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
    }

    @media(max-width: 768px) {
      .decoy-split {
        grid-template-columns: 1fr;
      }
      .highlight-diff {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="nav-header">
      <h1>Study <em>Decks</em></h1>
      <nav class="nav-links">
        <a href="index.html">Dashboard</a>
        <a href="deck.html">Study Deck</a>
        <a href="reader.html">Codal Reader</a>
        <a href="studio.html">Studio</a>
      </nav>
    </header>

    <div class="deck-control-panel">
      <div class="dropdown-container">
        <label for="subject-study-dropdown" style="font-weight: 600; font-size: 14px; color: var(--gold-deep);">Subject:</label>
        <select id="subject-study-dropdown" class="select-box">
          <option value="">-- Choose subject --</option>
        </select>
      </div>
      <button id="toggle-decoy-btn" class="btn-premium">Toggle Decoy Drill</button>
    </div>

    <div class="deck-layout">
      <!-- Standard Card View -->
      <div id="standard-card" class="study-card">
        <div class="card-front">
          <h3 id="card-shape-text">Select a subject to begin reviewing shapes.</h3>
          <div id="card-trigger-list" class="card-triggers" style="display: none;"></div>
        </div>
        <div class="card-back" id="card-back-contents">
          <h2 id="card-back-provision"></h2>
          <div class="card-back-elements-title">Elements Checklist</div>
          <div id="card-back-elements"></div>
          <div class="card-back-confusion-box">
            <p id="card-back-confusion"></p>
          </div>
        </div>
        <div class="flip-hint" id="card-flip-hint" style="display: none;">Click card to flip</div>
      </div>

      <!-- Decoy Cards View -->
      <div id="decoy-container" class="decoy-split">
        <div class="decoy-subcard">
          <h3>Shape A</h3>
          <p id="decoy-shape-a"></p>
          <div>
            <strong id="decoy-provision-a"></strong>
          </div>
        </div>
        <div class="decoy-subcard">
          <h3>Shape B</h3>
          <p id="decoy-shape-b"></p>
          <div>
            <strong id="decoy-provision-b"></strong>
          </div>
        </div>
        <div class="highlight-diff">
          <h4>Distinguishing Fact:</h4>
          <p id="decoy-diff-text"></p>
        </div>
      </div>
    </div>
    
    <div class="nav-buttons-container">
      <button id="prev-card-btn" class="btn-premium" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Previous
      </button>
      <span id="card-progress-indicator" class="progress-text"></span>
      <button id="next-card-btn" class="btn-premium" disabled>
        Next
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
      </button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
